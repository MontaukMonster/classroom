  			}
		}

		class Guess {
			constructor(x, y, treasure, canvas, colorIndex) {
				this.x = x;
				this.y = y;
				this.canvas = canvas;
				this.ctx = canvas.getContext("2d");

				// Distance to treasure
				this.distance = Math.hypot(treasure.x - x, treasure.y - y);

				// Distance-based color thresholds
				const thresholds = [
					{limit: 2, color: "red"},
					{limit: 3, color: "orange"},
					{limit: 4, color: "yellow"},
					{limit: 6, color: "green"},
					{limit: 8, color: "blue"},
					{limit: 10, color: "indigo"},
				];
				this.color = "MidnightBlue"; // default
				for (let t of thresholds) {
					if (this.distance < t.limit) {
						this.color = t.color;
						break;
					}
				}

				this.draw();
				this.createHoverInfo();
			}

			draw() {
				const centerX = 300 + 25 * this.x;
				const centerY = 300 - 25 * this.y;
				const radius = 10;
				this.ctx.beginPath();
				this.ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
				this.ctx.fillStyle = this.color;
				this.ctx.fill();
				this.ctx.stroke();
			}

			createHoverInfo() {
				const infoDiv = document.createElement("div");
				infoDiv.style.position = "absolute";
				infoDiv.style.left = `${this.canvas.offsetLeft + 300 + 25 * this.x - 10}px`;
				infoDiv.style.top = `${this.canvas.offsetTop + 300 - 25 * this.y - 10}px`;
				infoDiv.style.width = "20px";
				infoDiv.style.height = "20px";
				infoDiv.style.cursor = "pointer";

				infoDiv.addEventListener("mouseenter", () => {
					const tooltip = document.createElement("div");
					tooltip.className = "guess-tooltip";
					tooltip.innerText = `(${this.x}, ${this.y}) → ${this.distance.toFixed(2)}`;
					tooltip.style.left = `${infoDiv.offsetLeft + 25}px`;
					tooltip.style.top = `${infoDiv.offsetTop}px`;
					document.body.appendChild(tooltip);
					this.tooltip = tooltip;
				});

				infoDiv.addEventListener("mouseleave", () => {
					if (this.tooltip) this.tooltip.remove();
				});

				document.body.appendChild(infoDiv);
			}
		}

		// Globals
		let treasure;
		let guesses = [];
		let guessCount = 0;
		let gameOver = false;
		let bestGame = null;
		let player = null;
		let topScore = null;

		function clean(removeGrid = true) {
		    const c = document.getElementById("myCanvas");
		    const ctx = c.getContext("2d");

		    // Remove old guesses
		    guesses.forEach(g => {
		        if (g.tooltip) g.tooltip.remove();
		        if (g.hoverDiv) g.hoverDiv.remove();
		    });
		    guesses = [];

		    if(removeGrid) {
		        drawGrid();
		    }

		    displayMsg(1);
		}
		function displayMsg(code, value) {
			let msgString;
			const nameField = document.getElementById("playerName");
			nameField.style.display = (code == 1) ? "block" : "none";
			switch(code) {
				case 1: msgString = "Argh! Where's me buried treasure? Enter yer name first!"; break;
				case 2: msgString = `Yer ${value.toFixed(3)} paces from the treasure.`; break;
				case 3: msgString = "Argh!  You have to enter an ordered pair of the form (x, y)!"; break;
				case 4: msgString = `Ye found the treasure in ${value} tries!`; break;
			}
			document.getElementById("message").innerHTML = msgString;
			document.getElementById("bigBox").style.display = 'block';
		}

		function startGame() {
			treasure = new Treasure();
			guesses = [];
			guessCount = 0;
			document.getElementById("guessMe").value = "";
			clean();
			document.getElementById("boxBtn").value = "OK";
			gameOver = false;
			if(!topScore){
				document.getElementById("statsBox").style.display = "none";
			}else{
				document.getElementById("statsBox").style.display = "block";
			}
		}

		function parseInput(inputStr) {
			const match = inputStr.match(/\((-?\d+),\s*(-?\d+)\)/);
			if (match) return {x: parseInt(match[1]), y: parseInt(match[2])};
			return null;
		}

		function submitGuess() {
			const bigBox = document.getElementById("bigBox");
			const inputField = document.getElementById("guessMe");

	    	// If popup is visible, close it and refocus input instead of processing a new guess
	    	if (bigBox.style.display === "block") {
	        	bigBox.style.display = "none";
				if (gameOver) {
				        startGame();
				    } else {
				        inputField.focus();
				    }
	        	return; // stop the rest of the function
	    	}

			const inputStr = document.getElementById("guessMe").value;
			const coords = parseInput(inputStr);

			if(!coords) {
				displayMsg(3);
				document.getElementById("guessMe").value = "";
				return;
			}

			// Only increment if the guess is valid
			if(coords) {
			    guessCount++; // move this AFTER parsing
			    const canvas = document.getElementById("myCanvas");
			    const g = new Guess(coords.x, coords.y, treasure, canvas, guesses.length);
			    guesses.push(g);

			    if(coords.x === treasure.x && coords.y === treasure.y) {
			        displayMsg(4, guessCount);
					updateStats();
			        document.getElementById("boxBtn").value = "Play again?";
			        gameOver = true;
			    } else {
			        displayMsg(2, g.distance);
			    }
				document.getElementById("guessMe").value = "";
			}
		}
		
		function handlePopupOk() {
		    const bigBox = document.getElementById("bigBox");
			const nameInput = document.getElementById("playerName");
		    bigBox.style.display = 'none';
			
			if (!player || nameInput.value.trim() !== "") {
		        player = nameInput.value.trim();
			}

		    if(gameOver) {
		        startGame(); // immediately start a new round
		    } else {
		        document.getElementById("guessMe").focus(); // just refocus input if not game over
		    }
		}
		
		function drawGrid() {
		    const c = document.getElementById("myCanvas");
		    const ctx = c.getContext("2d");

		    ctx.clearRect(0, 0, c.width, c.height);

		    // draw axes
		    ctx.lineWidth = 1;
		    ctx.beginPath();
		    ctx.moveTo(0, 300); 
			ctx.lineTo(600, 300);
		    ctx.moveTo(300, 0); 
			ctx.lineTo(300, 600);
		    ctx.stroke();
			
		    // draw grid lines
		    
		    for (let i = 0; i <= 24; i++) {
				ctx.lineWidth = 0.2;
				ctx.beginPath();
		        ctx.moveTo(0, 25*i);
				ctx.lineTo(600, 25*i);
		        ctx.moveTo(25*i, 0);
				ctx.lineTo(25*i, 600);
		        ctx.stroke();
		    }
		}
		
		function updateStats() {
			
			const thisGame = { 
				name: player,
				score: guessCount
			};
			const hist = document.getElementById("history");
			const hiScore = document.getElementById("bestScore");
			
			hist.innerHTML += "<br>" + thisGame.name + " found it in " + thisGame.score + " tries";
			if(!topScore || guessCount < topScore){
				topScore = guessCount;
				document.getElementById("bestScore").innerHTML = thisGame.score;
				document.getElementById("leader").innerHTML = thisGame.name;
			}


		}

		function begin(){
		    drawGrid();        // draw initial grid and axes
		    startGame();       // initialize first treasure
		}
		
	</script>
</head>
